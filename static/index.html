<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT4/MT5 Trading Dashboard</title>
  <link rel="stylesheet" href="/static/css/dashboard.css">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- Alpine.js -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.5/cdn.min.js"></script>
</head>
<body>

<div id="app" x-data="dashboard()" x-init="init()" class="app-layout">

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- TOPBAR                                                                 -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <header class="topbar">
    <div class="topbar-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
        <polyline points="16 7 22 7 22 13"></polyline>
      </svg>
      Trading Dashboard
    </div>

    <!-- Period pills (shown on account view) -->
    <div class="tabs" x-show="activePage === 'account' && selectedId" style="display:none" x-cloak>
      <template x-for="p in ['Today','1W','1M','3M','6M','1Y','All']">
        <button class="tab-btn"
                :class="{active: $data.chartPeriod === p}"
                x-text="p"
                @click="$dispatch('switch-period', p)">
        </button>
      </template>
    </div>

    <div class="topbar-divider"></div>

    <!-- WS Status -->
    <div class="ws-status">
      <div class="ws-dot" id="wsIndicator"></div>
      <span id="wsLabel" style="font-size:11px">Connecting</span>
    </div>

    <!-- Notifications bell -->
    <div style="position:relative">
      <button class="btn btn-ghost btn-icon" @click="notifOpen = !notifOpen; if(notifOpen) loadNotifications()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span x-show="unreadCount > 0" x-text="unreadCount"
              style="position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700">
        </span>
      </button>

      <!-- Notif dropdown -->
      <div x-show="notifOpen" @click.away="notifOpen = false" x-cloak
           style="position:absolute;right:0;top:calc(100% + 8px);width:340px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:200">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:600;font-size:13px">Notifications</span>
          <button class="btn btn-ghost btn-sm" @click="markAllRead()" x-show="unreadCount > 0">Mark all read</button>
        </div>
        <div style="max-height:360px;overflow-y:auto">
          <template x-if="!notifications.length">
            <div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">No new notifications</div>
          </template>
          <template x-for="n in notifications" :key="n.id">
            <div style="padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer"
                 :style="n.is_read ? '' : 'background:var(--accent-bg)'"
                 @click="window.location.href = n.link || '#'">
              <div style="font-size:13px;font-weight:500;color:var(--text-primary)" x-text="n.title"></div>
              <div style="font-size:12px;color:var(--text-secondary);margin-top:2px" x-text="n.message"></div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:4px" x-text="new Date(n.created_at).toLocaleString()"></div>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- User menu -->
    <div style="position:relative" x-data="{open:false}">
      <button class="btn btn-ghost btn-sm" @click="open=!open" style="gap:8px">
        <div style="width:26px;height:26px;background:var(--accent-bg);border:1px solid var(--accent-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--accent);font-weight:600"
             x-text="($store.app.user?.display_name || 'U').charAt(0).toUpperCase()"></div>
        <span x-text="$store.app.user?.display_name || 'User'" style="font-size:13px;max-width:100px" class="truncate"></span>
      </button>
      <div x-show="open" @click.away="open=false" x-cloak
           style="position:absolute;right:0;top:calc(100% + 8px);min-width:180px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);z-index:200;overflow:hidden">
        <a href="#" style="display:block;padding:10px 16px;font-size:13px;color:var(--text-secondary)" @click.prevent="activePage='settings'">Settings</a>
        <a href="#" style="display:block;padding:10px 16px;font-size:13px;color:var(--text-secondary)" @click.prevent="activePage='alerts'">Alerts</a>
        <div style="height:1px;background:var(--border)"></div>
        <a href="#" style="display:block;padding:10px 16px;font-size:13px;color:var(--red)" @click.prevent="$store.app.logout()">Sign Out</a>
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- SIDEBAR                                                                -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-label">Overview</div>
      <div class="sidebar-link" :class="{active: activePage==='portfolio'}" @click="showPortfolio()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span>Portfolio</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Accounts</div>
      <template x-for="acct in accounts" :key="acct.id">
        <div class="sidebar-link" :class="{active: selectedId === acct.id}" @click="selectAccount(acct.id)">
          <div class="status-dot" :style="`background: var(--status-${acct.status})`"></div>
          <span x-text="acct.label || acct.account_number" class="truncate"></span>
        </div>
      </template>

      <div class="sidebar-link" @click="activePage='add-account'" :class="{active: activePage==='add-account'}" style="color:var(--text-muted);border:1px dashed var(--border);margin-top:4px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        <span>Add Account</span>
      </div>
    </div>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-section">
      <div class="sidebar-link" :class="{active: activePage==='alerts'}" @click="activePage='alerts'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        <span>Alerts</span>
        <span x-show="unreadCount > 0" x-text="unreadCount"
              style="margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 6px;font-size:10px;font-weight:700"></span>
      </div>
      <div class="sidebar-link" :class="{active: activePage==='settings'}" @click="activePage='settings'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span>Settings</span>
      </div>
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <!-- MAIN CONTENT                                                           -->
  <!-- ══════════════════════════════════════════════════════════════════════ -->
  <main class="main-content">

    <!-- Loading skeleton -->
    <template x-if="loading">
      <div>
        <div class="metric-grid">
          <template x-for="i in 6">
            <div class="metric-card"><div class="skeleton" style="height:60px;border-radius:6px"></div></div>
          </template>
        </div>
      </div>
    </template>

    <!-- ── PORTFOLIO VIEW ─────────────────────────────────────────────────── -->
    <template x-if="!loading && activePage === 'portfolio'">
      <div>
        <div class="page-header">
          <div>
            <div class="page-title">Portfolio Overview</div>
            <div class="page-subtitle" x-text="`${accounts.length} account${accounts.length !== 1 ? 's' : ''} · Live`"></div>
          </div>
          <div class="flex gap-2">
            <input type="text" class="input" placeholder="Search accounts…" x-model="searchQuery" style="width:200px">
            <select class="input select" x-model="filterStatus" style="width:140px">
              <option value="">All status</option>
              <option value="live">Live</option>
              <option value="delayed">Delayed</option>
              <option value="disconnected">Disconnected</option>
            </select>
            <button class="btn btn-primary" @click="activePage='add-account'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              Add Account
            </button>
          </div>
        </div>

        <!-- Portfolio Summary Metrics -->
        <div class="metric-grid" style="grid-template-columns: repeat(5, 1fr)">
          <div class="metric-card">
            <div class="metric-label">Total Balance</div>
            <div class="metric-value accent" x-text="'$' + (portfolio?.total_balance || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Total Equity</div>
            <div class="metric-value" x-text="'$' + (portfolio?.total_equity || 0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Floating P/L</div>
            <div class="metric-value" :class="plClass(portfolio?.total_floating_pl)" x-text="plSign(portfolio?.total_floating_pl || 0)"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Profit Today</div>
            <div class="metric-value" :class="plClass(portfolio?.total_profit_today)" x-text="plSign(portfolio?.total_profit_today || 0)"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Open Orders</div>
            <div class="metric-value" x-text="portfolio?.total_open_orders || 0"></div>
          </div>
        </div>

        <!-- Account Cards Grid -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px">
          <template x-for="acct in filteredAccounts" :key="acct.id">
            <div class="account-card" @click="selectAccount(acct.id)" :class="{selected: selectedId === acct.id}">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
                <div>
                  <div style="font-weight:600;font-size:14px;color:var(--text-primary)" x-text="acct.label || acct.account_number"></div>
                  <div style="font-size:11px;color:var(--text-muted);margin-top:2px" x-text="(acct.broker_name || acct.broker_server) + ' · #' + acct.account_number"></div>
                </div>
                <div class="status-badge" :class="acct.status">
                  <div class="status-dot"></div>
                  <span x-text="acct.status === 'market_closed' ? 'Market Closed' : acct.status.charAt(0).toUpperCase() + acct.status.slice(1)"></span>
                </div>
              </div>

              <!-- Mini metrics -->
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px">
                <div>
                  <div style="font-size:10px;color:var(--text-muted);margin-bottom:2px">EQUITY</div>
                  <div style="font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--accent)" x-text="'$' + (acct.equity||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})"></div>
                </div>
                <div>
                  <div style="font-size:10px;color:var(--text-muted);margin-bottom:2px">FLOATING P/L</div>
                  <div style="font-family:var(--font-mono);font-size:13px;font-weight:600" :class="plClass(acct.floating_pl)" x-text="plSign(acct.floating_pl||0)"></div>
                </div>
                <div>
                  <div style="font-size:10px;color:var(--text-muted);margin-bottom:2px">TODAY P/L</div>
                  <div style="font-family:var(--font-mono);font-size:13px;font-weight:600" :class="plClass(acct.profit_today)" x-text="plSign(acct.profit_today||0)"></div>
                </div>
              </div>

              <!-- Stats row -->
              <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding-top:10px;border-top:1px solid var(--border)">
                <div style="text-align:center">
                  <div style="font-size:10px;color:var(--text-muted)">Win Rate</div>
                  <div style="font-size:12px;font-weight:600;font-family:var(--font-mono)" x-text="(acct.win_rate||0).toFixed(1)+'%'"></div>
                </div>
                <div style="text-align:center">
                  <div style="font-size:10px;color:var(--text-muted)">P. Factor</div>
                  <div style="font-size:12px;font-weight:600;font-family:var(--font-mono)" x-text="(acct.profit_factor||0).toFixed(2)"></div>
                </div>
                <div style="text-align:center">
                  <div style="font-size:10px;color:var(--text-muted)">Max DD</div>
                  <div style="font-size:12px;font-weight:600;font-family:var(--font-mono);color:var(--red)" x-text="(acct.max_drawdown_pct||0).toFixed(2)+'%'"></div>
                </div>
                <div style="text-align:center">
                  <div style="font-size:10px;color:var(--text-muted)">Growth</div>
                  <div style="font-size:12px;font-weight:600;font-family:var(--font-mono)" :class="plClass(acct.growth_pct)" x-text="(acct.growth_pct||0) >= 0 ? '+' : '' + (acct.growth_pct||0).toFixed(1)+'%'"></div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- ── ACCOUNT DETAIL VIEW ─────────────────────────────────────────────── -->
    <template x-if="!loading && activePage === 'account' && selectedId">
      <div x-data="accountDetail(selectedId)" x-init="init()">

        <!-- Back + header -->
        <div class="page-header">
          <div style="display:flex;align-items:center;gap:12px">
            <button class="btn btn-ghost btn-sm" @click="showPortfolio()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div>
              <div class="page-title" x-text="account?.label || account?.account_number || '…'"></div>
              <div class="page-subtitle" x-show="account" x-text="`#${account?.account_number} · ${account?.broker_name || account?.broker_server} · ${account?.ea_name || 'EA'} v${account?.ea_version || '?'}`"></div>
            </div>
            <div class="status-badge" :class="account?.status" x-show="account">
              <div class="status-dot"></div>
              <span x-text="account?.status || ''"></span>
            </div>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-secondary btn-sm" @click="exportCSV()">Export CSV</button>
            <button class="btn btn-secondary btn-sm" @click="switchTab('settings')">Settings</button>
          </div>
        </div>

        <!-- Live Metrics Grid -->
        <div class="metric-grid" x-show="account">
          <div class="metric-card">
            <div class="metric-label">Balance</div>
            <div class="metric-value accent" x-text="'$' + (account?.balance||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Equity</div>
            <div class="metric-value" x-text="'$' + (account?.equity||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Floating P/L</div>
            <div class="metric-value" :class="plClass(account?.floating_pl)" x-text="plSign(account?.floating_pl||0)"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Profit Today</div>
            <div class="metric-value" :class="plClass(account?.profit_today)" x-text="plSign(account?.profit_today||0)"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Margin Level</div>
            <div class="metric-value" x-text="(account?.margin_level||0).toFixed(1) + '%'"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Open Orders</div>
            <div class="metric-value" x-text="account?.open_orders_count || 0"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Win Rate</div>
            <div class="metric-value" x-text="(account?.win_rate||0).toFixed(1) + '%'"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Profit Factor</div>
            <div class="metric-value" :class="(account?.profit_factor||0) >= 1.5 ? 'positive' : (account?.profit_factor||0) < 1 ? 'negative' : ''" x-text="(account?.profit_factor||0).toFixed(2)"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Max Drawdown</div>
            <div class="metric-value negative" x-text="(account?.max_drawdown_pct||0).toFixed(2) + '%'"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Sharpe Ratio</div>
            <div class="metric-value" x-text="account?.sharpe_ratio ? account.sharpe_ratio.toFixed(2) : 'N/A'"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Growth</div>
            <div class="metric-value" :class="plClass(account?.growth_pct)" x-text="(account?.growth_pct||0) >= 0 ? '+' : '' + (account?.growth_pct||0).toFixed(2)+'%'"></div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Expectancy</div>
            <div class="metric-value" :class="plClass(account?.expectancy)" x-text="plSign(account?.expectancy||0)"></div>
          </div>
        </div>

        <!-- Tabs -->
        <div style="display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0">
          <template x-for="tab in ['overview','trades','analytics','risk','open']">
            <button class="tab-btn" :class="{active: activeTab === tab}"
                    x-text="tab.charAt(0).toUpperCase() + tab.slice(1)"
                    @click="switchTab(tab)"
                    style="border-bottom: 2px solid transparent;border-radius:0;padding-bottom:12px">
            </button>
          </template>
        </div>

        <!-- ── OVERVIEW TAB ──────────────────────────────────────────────── -->
        <div x-show="activeTab === 'overview'">
          <!-- Equity Chart -->
          <div class="card" style="margin-bottom:14px">
            <div class="card-header">
              <span class="card-title">Equity Curve</span>
              <div class="tabs">
                <template x-for="p in ['Today','1W','1M','3M','6M','1Y','All']">
                  <button class="tab-btn" :class="{active: chartPeriod === p}" x-text="p" @click="switchPeriod(p)"></button>
                </template>
              </div>
            </div>
            <div style="height:300px" id="equityChart"></div>
          </div>

          <!-- Drawdown Chart -->
          <div class="card" style="margin-bottom:14px">
            <div class="card-header"><span class="card-title">Drawdown</span></div>
            <div style="height:160px"><canvas id="drawdownChart"></canvas></div>
          </div>

          <!-- More metrics table -->
          <div class="card">
            <div class="card-header"><span class="card-title">Full Statistics</span></div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
              <template x-for="[label, value, colored] in [
                ['Total Trades', account?.total_trades || 0, false],
                ['Max Win Streak', account?.max_consecutive_wins || 0, false],
                ['Max Loss Streak', account?.max_consecutive_losses || 0, false],
                ['Largest Win', '$' + (account?.largest_win||0).toFixed(2), false],
                ['Largest Loss', '$' + Math.abs(account?.largest_loss||0).toFixed(2), false],
                ['Avg Hold Time', (account?.avg_hold_time_min ? (account.avg_hold_time_min < 60 ? account.avg_hold_time_min.toFixed(0) + 'm' : (account.avg_hold_time_min/60).toFixed(1) + 'h') : 'N/A'), false],
                ['Sortino Ratio', account?.sortino_ratio ? account.sortino_ratio.toFixed(2) : 'N/A', false],
                ['Calmar Ratio', account?.calmar_ratio ? account.calmar_ratio.toFixed(2) : 'N/A', false],
                ['Recovery Factor', (account?.recovery_factor||0).toFixed(2), false],
                ['Annualized Return', (account?.annualized_return||0).toFixed(2) + '%', false],
                ['Avg Daily Profit', '$' + (account?.avg_daily_profit||0).toFixed(2), true],
                ['Peak Equity', '$' + (account?.peak_equity||0).toLocaleString(), false],
              ]">
                <div style="padding:8px 0;border-bottom:1px solid var(--border)">
                  <div style="font-size:11px;color:var(--text-muted);margin-bottom:3px" x-text="label"></div>

                <tbody>
                  <template x-for="t in trades" :key="t.ticket">

<script src="/static/js/websocket.js"></script>

<script src="/static/js/dashboard.js"></script>
<script>
  // WS status indicator
  const wsIndicator = document.getElementById('wsIndicator');
  const wsLabel     = document.getElementById('wsLabel');

  const updateWSStatus = (status) => {
    wsIndicator.className = `ws-dot ${status === 'connected' ? 'connected' : status === 'error' ? 'error' : ''}`;
    wsLabel.textContent = status === 'connected' ? 'Live' : status === 'connecting' ? 'Connecting…' : 'Offline';
  };

  // Override wsManager to propagate status
  const _origConnect = wsManager._connect.bind(wsManager);
  wsManager._connect = function(key, url, onMsg) {
    _origConnect(key, url, onMsg);
    const ws = wsManager._sockets[key];
    if (ws) {
      const origOpen  = ws.onopen;
      const origClose = ws.onclose;
      ws.onopen  = (e) => { updateWSStatus('connected');    origOpen  && origOpen(e); };
      ws.onclose = (e) => { updateWSStatus('disconnected'); origClose && origClose(e); };
    }
  };
</script>
